<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo API</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --border: #2a2a2a;
      --accent: #00e5a0;
      --accent-dim: rgba(0,229,160,0.12);
      --text: #e8e8e8;
      --muted: #666;
      --done: #333;
      --done-text: #555;
      --danger: #ff4444;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
    }

    header {
      width: 100%;
      max-width: 560px;
      margin-bottom: 48px;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      letter-spacing: -0.5px;
    }

    h1 span {
      color: var(--muted);
      font-weight: 400;
    }

    .add-form {
      width: 100%;
      max-width: 560px;
      display: flex;
      gap: 8px;
      margin-bottom: 32px;
    }

    .add-form input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 0 16px;
      height: 44px;
      outline: none;
      transition: border-color 0.15s;
    }

    .add-form input::placeholder { color: var(--muted); }
    .add-form input:focus { border-color: var(--accent); }

    .add-form button {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #000;
      font-family: 'DM Mono', monospace;
      font-size: 18px;
      font-weight: 500;
      width: 44px;
      height: 44px;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }

    .add-form button:hover { opacity: 0.85; }
    .add-form button:active { opacity: 0.7; }

    .stats {
      width: 100%;
      max-width: 560px;
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
    }

    .stat {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .stat span {
      color: var(--accent);
      margin-right: 4px;
    }

    .list {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .todo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.15s, opacity 0.2s;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover { border-color: #3a3a3a; }
    .todo-item.done { opacity: 0.5; }

    .check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, background 0.15s;
    }

    .check:hover { border-color: var(--accent); }

    .todo-item.done .check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .check-icon {
      width: 10px;
      height: 10px;
      display: none;
    }

    .todo-item.done .check-icon { display: block; }

    .todo-title {
      flex: 1;
      font-size: 14px;
      line-height: 1.4;
      transition: color 0.15s;
    }

    .todo-item.done .todo-title {
      text-decoration: line-through;
      color: var(--muted);
    }

    .todo-date {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      flex-shrink: 0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 4px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .todo-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { color: var(--danger); }

    .empty {
      width: 100%;
      max-width: 560px;
      text-align: center;
      padding: 48px 0;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.05em;
    }

    .api-badge {
      margin-top: 48px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
    }

    .api-badge a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">todo — api demo</div>
  <h1>Minhas tarefas <span>/ Node.js + PostgreSQL</span></h1>
</header>

<div class="add-form">
  <input type="text" id="new-todo" placeholder="Nova tarefa..." autocomplete="off">
  <button onclick="addTodo()" title="Adicionar">+</button>
</div>

<div class="stats">
  <div class="stat"><span id="total">0</span> total</div>
  <div class="stat"><span id="pending">0</span> pendentes</div>
  <div class="stat"><span id="done-count">0</span> concluídas</div>
</div>

<div class="list" id="list"></div>

<div class="api-badge">
  API: <a href="https://todo-api-docker-cicd.onrender.com/health" target="_blank">todo-api-docker-cicd.onrender.com</a>
</div>

<script>
  const API = 'https://todo-api-docker-cicd.onrender.com';

  async function load() {
    const res = await fetch(`${API}/todos`);
    const todos = await res.json();
    render(todos);
  }

  function render(todos) {
    const list = document.getElementById('list');
    list.innerHTML = '';

    document.getElementById('total').textContent = todos.length;
    document.getElementById('pending').textContent = todos.filter(t => !t.done).length;
    document.getElementById('done-count').textContent = todos.filter(t => t.done).length;

    if (!todos.length) {
      list.innerHTML = '<div class="empty">nenhuma tarefa ainda.</div>';
      return;
    }

    todos.forEach(todo => {
      const date = new Date(todo.created_at).toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });
      const el = document.createElement('div');
      el.className = `todo-item${todo.done ? ' done' : ''}`;
      el.innerHTML = `
        <div class="check" onclick="toggle(${todo.id})" title="Alternar status">
          <svg class="check-icon" viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1.5 5L4 7.5L8.5 2.5" stroke="#000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="todo-title">${todo.title}</span>
        <span class="todo-date">${date}</span>
        <button class="delete-btn" onclick="remove(${todo.id})" title="Remover">×</button>
      `;
      list.appendChild(el);
    });
  }

  async function addTodo() {
    const input = document.getElementById('new-todo');
    const title = input.value.trim();
    if (!title) return;
    input.value = '';
    await fetch(`${API}/todos`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title })
    });
    load();
  }

  async function toggle(id) {
    await fetch(`${API}/todos/${id}`, { method: 'PATCH' });
    load();
  }

  async function remove(id) {
    await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
    load();
  }

  document.getElementById('new-todo').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTodo();
  });

  load();
</script>
</body>
</html>
